name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ayoaru
          template: classic
          base: header, repositories
          plugin_lines: yes
          plugin_stars: yes
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_habits: yes
