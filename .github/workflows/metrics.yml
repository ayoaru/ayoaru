name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Core metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ayoaru
          template: classic
          base: header, repositories
          plugin_lines: yes
          plugin_stars: yes
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_habits: yes

      - name: AniList card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ayoaru
          filename: metrics.anilist.svg
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: Cryliic
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: watching, favorites

      - name: Steam card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ayoaru
          filename: metrics.steam.svg
          base: ""
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: "76561198885646314"
          plugin_steam_sections: recently-played

      - name: Spotify card
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.music.playlist.spotify.svg
          token: ""
          base: ""
          plugin_music: yes
          plugin_music_playlist: https://open.spotify.com/embed/playlist/4B7i1EbMagj9KWJbaGwfap
          plugin_music_limit: 3
